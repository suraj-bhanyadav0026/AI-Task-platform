# === FILE: infra-repo/k8s/base/redis-deployment.yaml ===
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: ai-tasks
spec:
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command: ["redis-server", "--appendonly", "yes"]
          ports:
            - containerPort: 6379
