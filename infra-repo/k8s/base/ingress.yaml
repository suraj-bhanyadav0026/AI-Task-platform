# === FILE: infra-repo/k8s/base/ingress.yaml ===
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-tasks-ingress
  namespace: ai-tasks
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: tasks.yourdomain.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 5000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
