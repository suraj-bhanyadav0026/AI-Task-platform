# === FILE: ai-task-platform/.github/workflows/ci-cd.yml ===
name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Node dependencies
        working-directory: ./backend
        run: npm ci

      - name: Run ESLint
        working-directory: ./backend
        run: npx eslint src/ || true # Proceeding even if no explicit override config available

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          
      - name: Install flake8
        run: pip install flake8
        
      - name: Run flake8
        working-directory: ./worker
        run: flake8 worker.py

  build-and-push:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ai-task-frontend:${{ github.sha }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ai-task-backend:${{ github.sha }}

      - name: Build and push worker
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ai-task-worker:${{ github.sha }}

  update-infra:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout infra repo
        uses: actions/checkout@v4
        with:
          repository: yourusername/infra-repo
          ssh-key: ${{ secrets.INFRA_REPO_DEPLOY_KEY }}
          path: infra-repo

      - name: Update image tags in K8s manifests
        working-directory: ./infra-repo/k8s/base
        run: |
          sed -i "s|image: yourdockerhub/ai-task-frontend:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/ai-task-frontend:${{ github.sha }}|g" frontend-deployment.yaml
          sed -i "s|image: yourdockerhub/ai-task-backend:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/ai-task-backend:${{ github.sha }}|g" backend-deployment.yaml
          sed -i "s|image: yourdockerhub/ai-task-worker:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/ai-task-worker:${{ github.sha }}|g" worker-deployment.yaml

      - name: Commit and push changes
        working-directory: ./infra-repo
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git commit -am "chore: update image tags to ${{ github.sha }}"
          git push origin main
